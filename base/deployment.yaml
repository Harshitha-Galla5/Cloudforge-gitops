apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmart
  namespace: cloudforge
  labels:
    app: freshmart

spec:
  replicas: 2

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: freshmart

  template:
    metadata:
      labels:
        app: freshmart

    spec:
      containers:
        - name: freshmart

          image: harshitha30galla/freshmart:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - secretRef:
               name: cloudforge-db-secret
  
          env:
            - name: NODE_ENV
              value: "production"

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

